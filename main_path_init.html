<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year 2 · 冲刺期路线图 | 质感赛道版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #c2e4f5 0%, #aad0e8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 游戏主板 — 采用第一个风格的柔和边框，保留原质感 */
        .game-board {
            max-width: 1100px;
            width: 100%;
            height: 800px;
            background: #fef7e8;        /* 暖米色基底，突出道路色彩 */
            border-radius: 48px;
            box-shadow: 0 25px 35px -12px rgba(0, 30, 45, 0.4);
            border: 3px solid #ffefcf;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 顶部状态栏 — 保留原游戏化风格 */
        .header {
            background: rgba(255, 250, 235, 0.85);
            backdrop-filter: blur(8px);
            padding: 14px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #f3cf9a;
            z-index: 20;
        }

        .header h1 {
            color: #2c5a6e;
            font-size: 1.55rem;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .header h1 i {
            color: #e6b34c;
            margin-right: 8px;
        }

        .coin-panel {
            background: #2c5a6e;
            color: #ffdf99;
            padding: 8px 22px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.25rem;
            border: 2px solid #ffcd7e;
            box-shadow: 0 3px 0 #163a48;
        }

        .coin-panel i {
            margin-right: 8px;
            color: #f9b81b;
        }

        /* 地图区域 — 路径画布与节点层 */
        .map-area {
            flex: 1;
            position: relative;
            background: #e5f2e9;   /* 柔和底色让道路更明显 */
            overflow: hidden;
        }

        /* SVG 背景道路层 (不干扰点击) */
        .path-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;   /* 让所有道路路径不阻挡节点点击 */
        }

        /* 道路风格 — 完全继承自「路径最终版」 */
        .road {
            fill: none;
            stroke: #6ec1ff;
            stroke-width: 45;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: blur(3px);
        }

        .road-core {
            fill: none;
            stroke: #4aa3df;
            stroke-width: 22;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* 对道路整体进行位置调整 + 横向拉长，适配节点分布区 */
        .road,
        .road-core {
            transform: scale(1.65, 1.45) translate(35px, 28px);
            transform-origin: center;
        }

        /* 节点样式 — 保留原版游戏化设计，微调阴影 */
        .node {
            position: absolute;
            z-index: 15;
            width: 64px;
            height: 64px;
            background: #1e2a32;
            border: 3px solid #f7d38b;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.7rem;
            cursor: pointer;
            box-shadow: 0 6px 0 #0f1a1f;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            backdrop-filter: blur(2px);
        }

        .node:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 0 #0f1a1f;
        }

        .node.completed {
            background: #f3ac3e;
            border-color: #fff3cf;
            color: #1e2a32;
            box-shadow: 0 4px 0 #b4621a;
        }

        .node.skipped {
            background: #7f8c8d;
            border-color: #cdd3d6;
            color: #ececec;
            opacity: 0.85;
            filter: grayscale(0.2);
        }

        .node.locked {
            background: #2e4a5c;
            cursor: not-allowed;
            filter: grayscale(0.4);
            opacity: 0.9;
        }

        .node-label {
            position: absolute;
            top: 70px;
            width: 128px;
            left: -32px;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 800;
            color: #1f4f62;
            background: rgba(255, 250, 225, 0.9);
            border-radius: 40px;
            padding: 4px 8px;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            pointer-events: none;
            white-space: nowrap;
        }

        /* 节点定位 (维持原版位置，但微调使路径从下方优雅穿过) */
        .n1 { top: 12%; left: 12%; }
        .n2 { top: 12%; left: 34%; }
        .n3 { top: 32%; left: 23%; }
        .n4 { top: 28%; left: 54%; }
        .n5 { top: 48%; left: 74%; }
        .n6 { top: 74%; left: 53%; }
        .n7 { top: 70%; left: 28%; background: #c53a1f; border-color: #ffbf80; }
        .n7 .fa-star { color: #ffdd77; filter: drop-shadow(0 0 4px gold); animation: pulseStar 1.4s infinite; }

        @keyframes pulseStar {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.25); text-shadow: 0 0 5px gold; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        /* 弹窗 Modal 保留原版精致风格 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(20, 35, 45, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .modal-content {
            background: #fffcf3;
            width: 90%;
            max-width: 620px;
            border-radius: 36px;
            padding: 28px 32px;
            border: 3px solid #e2bc7c;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .modal-header {
            font-size: 1.7rem;
            color: #2d5a6e;
            border-bottom: 2px dashed #e7bc7a;
            padding-bottom: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.95rem;
        }

        .btn-submit {
            background: #4f7d32;
            color: white;
            box-shadow: 0 4px 0 #2c5a1a;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            background: #659b42;
        }

        .btn-skip {
            background: #bd5e4a;
            color: white;
            box-shadow: 0 4px 0 #8a3e2c;
        }

        .btn-skip:hover {
            background: #d4735e;
        }

        /* Y2-1 捏脸组件 */
        .select-group {
            margin-bottom: 20px;
        }
        .select-group select {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: 2px solid #c9b38b;
            background: #fff6e8;
            font-weight: 500;
        }
        .avatar-card {
            display: none;
            background: #1f2f38;
            color: #fae67a;
            padding: 20px;
            border-radius: 32px;
            text-align: center;
            margin-top: 20px;
            border: 2px solid #eeb76b;
        }

        /* 炼金炉区域 */
        .cauldron-area {
            text-align: center;
            padding: 20px;
            background: #2e4a5c;
            border-radius: 28px;
            color: #ffeaac;
            margin-bottom: 20px;
        }
        .cauldron {
            font-size: 4rem;
            margin: 10px 0;
        }
        .ingredients {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .ingredient-btn {
            background: #3e6b7c;
            color: white;
            border: 2px solid #ffcf8a;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .ingredient-btn:hover {
            background: #f3b654;
            color: #1e2a32;
            border-color: white;
        }
    </style>
</head>

<!-- Modal 弹窗 -->
<div class="modal-overlay" id="taskModal">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modalTitle">任务标题</span>
            <i class="fas fa-times" style="cursor:pointer;" onclick="closeModal()"></i>
        </div>
        <div id="modalBody"></div>
        <div class="btn-group">
            <button class="btn btn-skip" onclick="skipTask()">跳过此节点 (无奖励)</button>
            <button class="btn btn-submit" id="submitBtn" onclick="completeTask()">完成并领取奖励 (+20币)</button>
        </div>
    </div>
</div>

<script>
    let coins = 60;
    let currentNode = 1;

    const templateY2_1 = `
        <p style="margin-bottom:15px;">🎓 告诉我们你的现状，生成专属角色卡！</p>
        <div class="select-group">
            <select id="gpaSelect">
                <option value="none">请选择当前均分 / GPA</option>
                <option value="high">稳扎型: 85分以上 / 3.5+</option>
                <option value="mid">冲刺型: 75-85分 / 2.5-3.5</option>
                <option value="low">逆袭型: 75分以下 / 2.5以下</option>
            </select>
        </div>
        <button class="btn btn-submit" style="width:100%;" onclick="generateCard()">🎲 生成角色卡</button>
        <div class="avatar-card" id="avatarCard">
            <h2 id="cardType">❓ 未知角色</h2>
            <i class="fas fa-user-astronaut" style="font-size:3rem; margin:15px 0; color:#f5b342;"></i>
            <p>已解锁成就：【初出茅庐】</p>
        </div>
    `;

    const templateY2_4 = `
        <p style="margin-bottom:15px;">🧪 如果你想申请 <b>计算机 (CS)</b>，请把最重要的材料投入炼金炉！</p>
        <div class="cauldron-area">
            <div class="cauldron" id="cauldronIcon">⚗️</div>
            <p id="cauldronText">等待加入材料...</p>
        </div>
        <div class="ingredients">
            <button class="ingredient-btn" onclick="addIngredient('GPA')">📜 成绩/GPA</button>
            <button class="ingredient-btn" onclick="addIngredient('实习')">💼 实习经历</button>
            <button class="ingredient-btn" onclick="addIngredient('科研')">🔬 科研项目</button>
        </div>
    `;

    function openNode(nodeId, title) {
        currentNode = nodeId;
        document.getElementById('modalTitle').innerText = title;
        const body = document.getElementById('modalBody');
        if(nodeId === 1) body.innerHTML = templateY2_1;
        else if (nodeId === 4) body.innerHTML = templateY2_4;
        else body.innerHTML = `<p>✨ 节点 ${nodeId} 的专属任务正在快马加鞭开发中，敬请期待～</p>`;
        document.getElementById('taskModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('taskModal').style.display = 'none';
    }

    function completeTask() {
        coins += 20;
        document.getElementById('coinDisplay').innerText = coins;
        const nodeEl = document.querySelector('.n' + currentNode);
        nodeEl.classList.remove('locked');
        nodeEl.classList.add('completed');
        nodeEl.innerHTML = '<i class="fas fa-check"></i><div class="node-label">已完成</div>';
        unlockNextNode();
        closeModal();
    }

    function skipTask() {
        const nodeEl = document.querySelector('.n' + currentNode);
        nodeEl.classList.remove('locked');
        nodeEl.classList.add('skipped');
        nodeEl.innerHTML = '<i class="fas fa-forward"></i><div class="node-label">已跳过</div>';
        unlockNextNode();
        closeModal();
    }

    function unlockNextNode() {
        const nextNode = currentNode + 1;
        if(nextNode <= 7) {
            const nextElem = document.querySelector('.n' + nextNode);
            if(nextElem) nextElem.classList.remove('locked');
        }
    }

    window.generateCard = function() {
        const val = document.getElementById('gpaSelect').value;
        const card = document.getElementById('avatarCard');
        const type = document.getElementById('cardType');
        if(val === 'none') return alert('请先选择你的GPA段位～');
        card.style.display = 'block';
        if(val === 'high') type.innerText = "🛡️ 稳扎型学霸 · 目标G5/港三";
        if(val === 'mid') type.innerText = "⚔️ 冲刺型战士 · 逆袭潜力股";
        if(val === 'low') type.innerText = "🔥 逆袭型黑马 · 厚积薄发";
    };

    let addedItems = [];
    window.addIngredient = function(item) {
        if(addedItems.length >= 2) return alert('炼金炉容量有限，只能投入两种核心材料！');
        addedItems.push(item);
        const cauldronText = document.getElementById('cauldronText');
        document.getElementById('cauldronIcon').innerText = "🧪✨";
        cauldronText.innerText = "已加入: " + addedItems.join(" + ");
        if(addedItems.length === 2) {
            if(addedItems.includes('GPA') && addedItems.includes('科研')) {
                cauldronText.innerHTML = "<span style='color:#c3f0a8'>🏆 完美配方！CS授课硕最看重高GPA+科研背景！</span>";
            } else {
                cauldronText.innerHTML = "<span style='color:#ffbc7a'>💡 配方还可优化，硬成绩+科研通常是王牌组合～</span>";
            }
        }
    };
</script>

</html>
